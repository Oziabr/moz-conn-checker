<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Network check</title>
<style>
/* ── tokens ─────────────────────────────────────────────────────── */
:root {
  --bg:         #F7F8FC;
  --surface:    #FFFFFF;
  --text:       #111318;
  --muted:      #6B7280;
  --border:     #E5E7EB;
  --accent:     #2563EB;

  --ok:         #16A34A; --ok-bg:   #F0FDF4; --ok-bar:   #4ADE80;
  --warn:       #B45309; --warn-bg: #FFFBEB; --warn-bar: #FCD34D;
  --fail:       #DC2626; --fail-bg: #FEF2F2; --fail-bar: #F87171;
  --run-bar:    #93C5FD;

  --radius:     12px;
  --bar:        4px;
  --shadow:     0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:        #0F1117;
    --surface:   #1A1D27;
    --text:      #E8EAF0;
    --muted:     #9CA3AF;
    --border:    #2A2D3A;

    --ok-bg:     #052E16; --ok-bar:   #22C55E;
    --warn-bg:   #1C1100; --warn-bar: #FBBF24;
    --fail-bg:   #1F0606; --fail-bar: #EF4444;
    --run-bar:   #3B82F6;
    --shadow:    0 1px 3px rgba(0,0,0,.4);
  }
}

/* ── reset ───────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding: 0 0 env(safe-area-inset-bottom, 0);
}

/* ── layout ──────────────────────────────────────────────────────── */
.wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 36px 20px 64px;
}
@media (max-width: 480px) {
  .wrap { padding: 28px 16px 52px; }
}

/* ── header ──────────────────────────────────────────────────────── */
.header { margin-bottom: 28px; }
.eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.02em;
  line-height: 1.2;
}
@media (max-width: 480px) {
  h1 { font-size: 22px; }
}
.sub {
  margin-top: 6px;
  font-size: 14px;
  color: var(--muted);
  max-width: 360px;
}

/* ── button ──────────────────────────────────────────────────────── */
#run-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 22px;
  padding: 0 24px;
  height: 46px;
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  width: 100%;
  justify-content: center;
}
@media (min-width: 400px) {
  #run-btn { width: auto; min-width: 180px; }
}
#run-btn:active  { transform: scale(.98); }
#run-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
.btn-spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: sp .65s linear infinite;
  display: none;
}
#run-btn.running .btn-spinner { display: block; }

/* ── grid ────────────────────────────────────────────────────────── */
#grid {
  margin-top: 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 480px) {
  #grid { grid-template-columns: 1fr; gap: 10px; }
}

/* ── card ────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border-left: var(--bar) solid var(--border);
  padding: 16px 18px 16px 16px;
  opacity: 0;
  transform: translateY(8px);
  transition:
    border-color .3s ease,
    background   .3s ease,
    opacity      .25s ease,
    transform    .25s ease;
}
.card.visible   { opacity: 1; transform: none; }
.card.ok        { border-left-color: var(--ok-bar);   background: var(--ok-bg); }
.card.warn      { border-left-color: var(--warn-bar); background: var(--warn-bg); }
.card.fail      { border-left-color: var(--fail-bar); background: var(--fail-bg); }
.card.running   { border-left-color: var(--run-bar); }

.card-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 5px;
}
.card-status {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  min-height: 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-spinner {
  width: 11px; height: 11px;
  border: 2px solid var(--border);
  border-top-color: var(--muted);
  border-radius: 50%;
  animation: sp .65s linear infinite;
  flex-shrink: 0;
}
.card.ok   .card-status { color: var(--ok); }
.card.warn .card-status { color: var(--warn); }
.card.fail .card-status { color: var(--fail); }

.card-detail {
  margin-top: 5px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.55;
}
.card-hint {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  line-height: 1.55;
  font-style: italic;
  display: none;
}
.card-hint::before { content: '→ '; font-style: normal; }

.geo {
  margin-top: 8px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 2px 10px;
  font-size: 12px;
}
.geo .gk { color: var(--muted); }
.geo .gv { color: var(--text); font-weight: 500; word-break: break-all; }

/* ── summary ─────────────────────────────────────────────────────── */
#summary {
  margin-top: 18px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: .01em;
  min-height: 18px;
}

/* ── animation ───────────────────────────────────────────────────── */
@keyframes sp { to { transform: rotate(360deg); } }

@media (prefers-reduced-motion: reduce) {
  .card { transition: border-color .15s, background .15s; opacity: 1; transform: none; }
  .btn-spinner, .card-spinner { animation: none; }
}
</style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="eyebrow">Diagnostics</div>
    <h1>Network check</h1>
    <p class="sub">Tests what this network allows — DNS, HTTPS, VPN protocols, and your visible IP.</p>
    <button id="run-btn">
      <span class="btn-spinner"></span>
      <span id="btn-label">Check my network</span>
    </button>
  </header>

  <div id="grid"></div>
  <div id="summary"></div>

</div>
<script>
var DEFS = [
  { id: 'captive', label: 'Captive portal'   },
  { id: 'google',  label: 'Google access'    },
  { id: 'https',   label: 'HTTPS / port 443' },
  { id: 'dns',     label: 'DNS vs DoH'       },
  { id: 'geo',     label: 'Your IP'          },
  { id: 'udp',     label: 'Outbound UDP'     },
]

var DOH  = 'https://mozilla.cloudflare-dns.com/dns-query'
var HOST = 'example.org'
var cards = {}

function mkCard(def) {
  var c = document.createElement('div')
  c.className = 'card'
  c.id = 'c-' + def.id
  c.innerHTML =
    '<div class="card-label">' + def.label + '</div>' +
    '<div class="card-status"><div class="card-spinner"></div><span class="cs-text">Waiting</span></div>' +
    '<div class="card-detail"></div>' +
    '<div class="card-hint"></div>' +
    '<div class="card-geo"></div>'
  cards[def.id] = c
  return c
}

function spinning(id) {
  var c = cards[id]; if (!c) return
  c.classList.add('running')
  c.querySelector('.card-spinner').style.display = ''
  c.querySelector('.cs-text').textContent = 'Checking\u2026'
}

function done(id, status, statusText, detail, hint, geoHtml) {
  var c = cards[id]; if (!c) return
  c.classList.remove('running')
  c.classList.add(status)
  c.querySelector('.card-spinner').style.display = 'none'
  c.querySelector('.cs-text').textContent = statusText
  var det = c.querySelector('.card-detail')
  if (detail) { det.textContent = detail } else { det.style.display = 'none' }
  var h = c.querySelector('.card-hint')
  if (hint) { h.textContent = hint; h.style.display = '' }
  if (geoHtml) c.querySelector('.card-geo').innerHTML = geoHtml
}

function geo(rows) {
  return '<div class="geo">' +
    rows.map(function(r) {
      return '<span class="gk">' + r[0] + '</span><span class="gv">' + r[1] + '</span>'
    }).join('') +
  '</div>'
}

/* ── checks ──────────────────────────────────────────────────────── */

function runCaptive() {
  spinning('captive')
  if (location.protocol === 'https:') {
    done('captive', 'warn', 'HTTPS page',
      'Browser blocks HTTP probes on HTTPS pages.',
      'Open neverssl.com manually \u2014 no login prompt means no captive portal.')
    return Promise.resolve()
  }
  return fetch('http://neverssl.com/', { mode: 'no-cors', redirect: 'manual', cache: 'no-store' })
    .then(function(r) {
      if (r.type === 'opaqueredirect')
        done('captive', 'fail', 'Portal detected',
          'HTTP traffic is being redirected to a login page.',
          'Complete the network sign-in, then re-run.')
      else
        done('captive', 'ok', 'No portal', 'No captive portal redirect on HTTP traffic.')
    })
    .catch(function() {
      done('captive', 'warn', 'Unknown', 'HTTP probe was blocked.')
    })
}

function runGoogle() {
  spinning('google')
  return fetch('https://www.google.com/', { mode: 'no-cors', cache: 'no-store' })
    .then(function()  { done('google', 'ok',   'Reachable',   'google.com is accessible.') })
    .catch(function() { done('google', 'fail',  'Blocked',
      'google.com is unreachable.',
      'Could be a regional block or content filter on this AP.') })
}

function runHttps() {
  spinning('https')
  var targets = [
    'https://www.mozilla.org/robots.txt',
    'https://www.cloudflare.com/robots.txt',
  ]
  return Promise.allSettled(targets.map(function(u) {
    return fetch(u, { mode: 'no-cors', cache: 'no-store' })
  })).then(function(res) {
    var ok = res.filter(function(r) { return r.status === 'fulfilled' }).length
    if (ok === targets.length)
      done('https', 'ok', 'Open', 'All HTTPS targets reachable.')
    else if (ok > 0)
      done('https', 'warn', 'Partial',
        ok + '/' + targets.length + ' HTTPS targets reachable.',
        'Filtering looks destination-specific (IP or domain block).')
    else
      done('https', 'fail', 'Blocked',
        'No HTTPS targets reachable.',
        'Port 443 may be blocked. Check for a captive portal or proxy.')
  })
}

function runDns() {
  spinning('dns')
  return Promise.allSettled([
    fetch('https://' + HOST + '/', { mode: 'no-cors', cache: 'no-store' }),
    fetch(DOH + '?name=' + HOST + '&type=A', { headers: { accept: 'application/dns-json' } }),
  ]).then(function(res) {
    var sysOk = res[0].status === 'fulfilled'
    var dohP = (res[1].status === 'fulfilled')
      ? res[1].value.json().catch(function() { return null })
      : Promise.resolve(null)
    return dohP.then(function(j) {
      var dohOk = j && j.Answer && j.Answer.length > 0
      if (sysOk && dohOk)
        return done('dns', 'ok', 'Resolving', 'System DNS and DoH both resolve correctly.')
      if (!sysOk && dohOk)
        return done('dns', 'fail', 'Filtered',
          HOST + ' resolves via DoH but local DNS fails.',
          'DNS is being filtered. Enable DoH in your browser or VPN settings.')
      if (!sysOk && !dohOk)
        return done('dns', 'fail', 'All DNS blocked',
          'Both system DNS (port 53) and DoH (port 443) fail.',
          'No names can be resolved on this network.')
      done('dns', 'warn', 'DoH blocked',
        'System DNS works but the DoH endpoint is unreachable.',
        'DoH-based VPN leak protection may fail on this network.')
    })
  })
}

function runGeo() {
  spinning('geo')
  return fetch('https://ipapi.co/json/', { cache: 'no-store' })
    .then(function(r) { return r.json() })
    .then(function(d) {
      if (!d || !d.ip) throw new Error('no ip')
      var isVpn = d.org && /vpn|hosting|cloud|aws|digitalocean|linode|vultr|ovh|hetzner/i.test(d.org)
      var note = isVpn
        ? 'Traffic exits through a VPN or cloud host.'
        : 'Traffic exits through a regular ISP.'
      done('geo', 'ok', d.ip, note, null,
        geo([
          ['IP',       d.ip],
          ['Location', [d.city, d.region, d.country_name].filter(Boolean).join(', ') || '\u2014'],
          ['ISP',      d.org || '\u2014'],
        ]))
    })
    .catch(function() {
      done('geo', 'warn', 'Unavailable',
        'Geolocation API unreachable.',
        'Check HTTPS reachability above.')
    })
}

function runUdp() {
  spinning('udp')
  return new Promise(function(resolve) {
    var pc = null, found = false, tid = null
    function finish() {
      try { if (pc) pc.close() } catch(e) {}
      if (found)
        done('udp', 'ok', 'Open', 'Outbound UDP works \u2014 STUN server replied.')
      else
        done('udp', 'fail', 'Blocked',
          'No UDP response after 4.5 s.',
          'WireGuard won\u2019t work here. Try OpenVPN TCP or SSL VPN on port 443.')
      resolve()
    }
    try {
      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] })
      tid = setTimeout(finish, 4500)
      pc.onicecandidate = function(e) {
        if (e.candidate && e.candidate.protocol === 'udp') {
          found = true; clearTimeout(tid); finish()
        }
      }
      pc.createDataChannel('p')
      pc.createOffer()
        .then(function(o) { return pc.setLocalDescription(o) })
        .catch(function() { clearTimeout(tid); finish() })
    } catch(e) {
      clearTimeout(tid)
      done('udp', 'warn', 'Skipped', 'WebRTC not available in this context.')
      resolve()
    }
  })
}

var RUNNERS = [runCaptive, runGoogle, runHttps, runDns, runGeo, runUdp]

/* ── runner ──────────────────────────────────────────────────────── */

document.getElementById('run-btn').addEventListener('click', function() {
  var btn      = document.getElementById('run-btn')
  var btnLabel = document.getElementById('btn-label')
  var grid     = document.getElementById('grid')
  var summary  = document.getElementById('summary')

  btn.disabled = true
  btn.classList.add('running')
  btnLabel.textContent = 'Checking\u2026'
  summary.textContent = ''
  grid.innerHTML = ''
  cards = {}

  DEFS.forEach(function(def, i) {
    var c = mkCard(def)
    grid.appendChild(c)
    setTimeout(function() { c.classList.add('visible') }, i * 55)
  })

  Promise.allSettled(RUNNERS.map(function(fn) {
    return fn().catch(function(e) { console.warn('check error', e) })
  })).then(function() {
    var counts = { ok: 0, warn: 0, fail: 0 }
    DEFS.forEach(function(def) {
      var c = cards[def.id]; if (!c) return
      if (c.classList.contains('ok'))   counts.ok++
      if (c.classList.contains('warn')) counts.warn++
      if (c.classList.contains('fail')) counts.fail++
    })
    var parts = []
    if (counts.ok)   parts.push(counts.ok   + ' ok')
    if (counts.warn) parts.push(counts.warn + ' warning' + (counts.warn > 1 ? 's' : ''))
    if (counts.fail) parts.push(counts.fail + ' failed')
    summary.textContent = parts.join(' \u00b7 ') + ' \u2014 ' + new Date().toLocaleTimeString()

    btn.disabled = false
    btn.classList.remove('running')
    btnLabel.textContent = 'Check again'
  })
})
</script>
</body>
</html>
