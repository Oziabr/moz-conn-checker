<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Network check</title>
<style>
  :root {
    --green:  #2e7d32; --green-bg:  #e8f5e9;
    --yellow: #856404; --yellow-bg: #fff8e1;
    --red:    #c62828; --red-bg:    #ffebee;
    --muted:  #666;
    --border: #e0e0e0;
    --radius: 8px;
    color-scheme: light dark;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --green:  #81c784; --green-bg:  #1b2e1c;
      --yellow: #ffd54f; --yellow-bg: #2c2510;
      --red:    #ef9a9a; --red-bg:    #2e1212;
      --muted:  #999;
      --border: #333;
    }
    body { background: #111; color: #eee; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; max-width: 640px; margin: 0 auto; padding: 24px 16px 48px; }
  h1 { font-size: 17px; font-weight: 500; margin-bottom: 20px; }
  button { padding: 8px 18px; border: none; border-radius: var(--radius); background: #1a1a1a; color: #fff; font-size: 14px; cursor: pointer; }
  @media (prefers-color-scheme: dark) { button { background: #eee; color: #111; } }
  button:disabled { opacity: 0.45; cursor: default; }
  #checks { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .check { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; transition: border-color 0.2s; }
  .check-head { display: flex; align-items: center; gap: 8px; font-weight: 500; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.3s; }
  .check.running .dot { background: #999; animation: pulse 1s infinite; }
  .check.ok     .dot { background: var(--green); }
  .check.warn   .dot { background: var(--yellow); }
  .check.fail   .dot { background: var(--red); }
  .check.ok   { border-color: var(--green); background: var(--green-bg); }
  .check.warn { border-color: var(--yellow); background: var(--yellow-bg); }
  .check.fail { border-color: var(--red);   background: var(--red-bg); }
  .detail { margin-top: 6px; padding-left: 17px; color: var(--muted); line-height: 1.5; }
  .hint { margin-top: 4px; padding-left: 17px; line-height: 1.5; }
  .hint::before { content: '→  '; opacity: 0.6; }
  .geo-grid { margin-top: 8px; padding-left: 17px; display: grid; grid-template-columns: auto 1fr; gap: 2px 12px; }
  .geo-grid span:nth-child(odd) { color: var(--muted); }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
  #summary { margin-top: 18px; font-size: 13px; color: var(--muted); }
  a { color: inherit; }
</style>
</head>
<body>
<h1>Network check</h1>
<button id="btn">Run checks</button>
<div id="checks"></div>
<div id="summary"></div>

<script>
const CHECKS = [
  { id: 'captive',  label: 'Captive portal'          },
  { id: 'google',   label: 'Google access'            },
  { id: 'https',    label: 'HTTPS reachability'       },
  { id: 'dns',      label: 'DNS vs DNS-over-HTTPS'    },
  { id: 'geo',      label: 'Your IP and location'     },
  { id: 'udp',      label: 'Outbound UDP (STUN probe)'},
]

const DOH    = 'https://mozilla.cloudflare-dns.com/dns-query'
const TARGET = 'example.org'

const $ = id => document.getElementById(id)
const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html) e.innerHTML = html; return e }

const setCheck = (id, status, detail, hint, extra) => {
  const card = $('c-' + id)
  if (!card) return
  card.className = 'check ' + status
  const det = card.querySelector('.detail')
  const hin = card.querySelector('.hint')
  if (det) det.textContent = detail || ''
  if (hin) { if (hint) { hin.textContent = hint; hin.style.display = '' } else hin.style.display = 'none' }
  if (extra) {
    const ex = card.querySelector('.extra')
    if (ex) ex.innerHTML = extra
  }
}

const runCaptive = async () => {
  const isHttps = location.protocol === 'https:'
  if (isHttps) {
    setCheck('captive', 'warn',
      'This page is served over HTTPS so the browser blocks HTTP probes (mixed content policy).',
      'Open neverssl.com manually — if it loads without a login screen, no captive portal is active.')
    return
  }
  try {
    const r = await fetch('http://neverssl.com/', { mode: 'no-cors', redirect: 'manual', cache: 'no-store' })
    if (r.type === 'opaqueredirect') {
      setCheck('captive', 'fail',
        'The network redirected the HTTP probe — a captive portal is intercepting traffic.',
        'Connect to the network's login page (usually opens automatically), complete the sign-in, then re-run.')
    } else {
      setCheck('captive', 'ok', 'No captive portal redirect detected on HTTP traffic.')
    }
  } catch {
    setCheck('captive', 'warn', 'HTTP probe failed — could not determine captive portal status.')
  }
}

const runGoogle = async () => {
  try {
    await fetch('https://www.google.com/', { mode: 'no-cors', cache: 'no-store' })
    setCheck('google', 'ok', 'google.com is reachable from this network.')
  } catch {
    setCheck('google', 'fail',
      'google.com could not be reached.',
      'If you are on a network in a country that blocks Google services, this is expected. Otherwise check for a firewall or content filter.')
  }
}

const runHttps = async () => {
  const targets = ['https://www.mozilla.org/robots.txt', 'https://www.cloudflare.com/robots.txt']
  const results = await Promise.all(targets.map(url =>
    fetch(url, { cache: 'no-store' }).then(() => true).catch(() => false)
  ))
  const pass = results.filter(Boolean).length
  if (pass === targets.length) {
    setCheck('https', 'ok', 'All HTTPS targets reachable — port 443 is open.')
  } else if (pass > 0) {
    setCheck('https', 'warn',
      `${pass} of ${targets.length} HTTPS targets reachable — some destinations appear blocked.`,
      'The filtering looks destination-specific (IP block or domain filter).')
  } else {
    setCheck('https', 'fail',
      'No HTTPS targets reachable.',
      'Standard web traffic on port 443 is being blocked. Check for a captive portal, aggressive proxy, or content filter.')
  }
}

const runDns = async () => {
  const sysOk = await fetch(`https://${TARGET}/`, { mode: 'no-cors', cache: 'no-store' }).then(() => true).catch(() => false)
  const dohRes = await fetch(`${DOH}?name=${TARGET}&type=A`, { headers: { accept: 'application/dns-json' } }).catch(() => null)
  const dohBody = dohRes?.ok ? await dohRes.json().catch(() => null) : null
  const dohOk = dohBody?.Answer?.length > 0

  if (sysOk && dohOk)  return setCheck('dns', 'ok', 'System DNS resolves correctly and matches DNS-over-HTTPS.')
  if (!sysOk && dohOk) return setCheck('dns', 'fail',
    `The name ${TARGET} exists publicly but this network refuses to resolve it locally.`,
    'DNS is being filtered or hijacked. Switch to DoH in your browser or VPN settings.')
  if (!sysOk && !dohOk) return setCheck('dns', 'fail',
    'Both system DNS and DNS-over-HTTPS fail.',
    'DNS (port 53) and HTTPS DNS (port 443) are both blocked. No names can be resolved.')
  setCheck('dns', 'warn',
    'System DNS works but the DNS-over-HTTPS endpoint itself is unreachable.',
    'DoH-based VPN clients or leak-prevention tools may not work on this network.')
}

const runGeo = async () => {
  const r = await fetch('https://ipapi.co/json/', { cache: 'no-store' }).catch(() => null)
  if (!r?.ok) {
    setCheck('geo', 'warn', 'Could not reach the geolocation API — check HTTPS reachability above.')
    return
  }
  const d = await r.json().catch(() => null)
  if (!d?.ip) { setCheck('geo', 'warn', 'Geolocation API returned an unexpected response.'); return }

  const rows = [
    ['IP', d.ip],
    ['Location', [d.city, d.region, d.country_name].filter(Boolean).join(', ')],
    ['ISP / org', d.org || d.asn || '—'],
    ['Timezone', d.timezone || '—'],
  ].map(([k, v]) => `<span>${k}</span><span>${v}</span>`).join('')

  const isVpn = d.org && /vpn|hosting|cloud|aws|digitalocean|linode|vultr|ovh|hetzner/i.test(d.org)
  const note = isVpn
    ? 'The ISP/org name suggests traffic is exiting through a VPN or cloud host.'
    : 'Traffic appears to exit through a regular ISP (no VPN detected in the org field).'

  setCheck('geo', 'ok', note, null, `<div class="geo-grid">${rows}</div>`)
}

const runUdp = () => new Promise(resolve => {
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] })
  let found = false
  pc.onicecandidate = e => { if (e.candidate?.protocol === 'udp') found = true }
  const done = () => {
    pc.close()
    if (found) setCheck('udp', 'ok', 'Outbound UDP exits this network — STUN server responded via UDP.')
    else       setCheck('udp', 'fail',
      'No UDP candidates were gathered — outbound UDP appears to be blocked.',
      'WireGuard and most VPN UDP modes will not work here. Try OpenVPN over TCP or an SSL VPN on port 443.')
    resolve()
  }
  setTimeout(done, 4000)
  pc.createDataChannel('p')
  pc.createOffer().then(o => pc.setLocalDescription(o)).catch(done)
})

const RUNNERS = { captive: runCaptive, google: runGoogle, https: runHttps, dns: runDns, geo: runGeo, udp: runUdp }

const btn = $('btn')
btn.addEventListener('click', async () => {
  btn.disabled = true
  btn.textContent = 'Running…'
  $('summary').textContent = ''

  const container = $('checks')
  container.innerHTML = ''

  CHECKS.forEach(({ id, label }) => {
    const card = el('div', 'check running')
    card.id = 'c-' + id
    card.innerHTML = `
      <div class="check-head"><span class="dot"></span>${label}</div>
      <div class="detail">Checking…</div>
      <div class="hint" style="display:none"></div>
      <div class="extra"></div>`
    container.appendChild(card)
  })

  await Promise.all(CHECKS.map(({ id }) => RUNNERS[id]()))

  const counts = { ok: 0, warn: 0, fail: 0 }
  CHECKS.forEach(({ id }) => {
    const c = $('c-' + id)
    if (c.classList.contains('ok'))   counts.ok++
    if (c.classList.contains('warn')) counts.warn++
    if (c.classList.contains('fail')) counts.fail++
  })

  const parts = []
  if (counts.ok)   parts.push(`${counts.ok} ok`)
  if (counts.warn) parts.push(`${counts.warn} warning${counts.warn > 1 ? 's' : ''}`)
  if (counts.fail) parts.push(`${counts.fail} failed`)
  $('summary').textContent = parts.join(' · ') + '  —  ' + new Date().toLocaleTimeString()

  btn.disabled = false
  btn.textContent = 'Run again'
})
</script>
</body>
</html>
