<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 320px; margin: 0; padding: 14px; font-family: -apple-system, system-ui, sans-serif; font-size: 13px; color: #1d1d1f; background: #fafafa; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  button { width: 100%; padding: 8px; border: none; border-radius: 6px; background: #1d1d1f; color: #fff; font-size: 13px; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: default; }
  ul { list-style: none; margin: 12px 0 0; padding: 0; }
  li { padding: 8px 0; border-top: 1px solid #e5e5e5; }
  li:first-child { border-top: none; }
  .label { font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .ok .dot { background: #2e7d32; }
  .warn .dot { background: #b8860b; }
  .fail .dot { background: #c62828; }
  .detail { margin: 3px 0 0; color: #555; line-height: 1.4; }
  .empty { color: #777; margin-top: 12px; }
</style>
</head>
<body>
  <h1>Net Diagnostics</h1>
  <button id="run">Run check</button>
  <div id="output"><p class="empty">Run the check to see what this network is doing to your traffic.</p></div>
  <script src="popup.js"></script>
</body>
</html>
